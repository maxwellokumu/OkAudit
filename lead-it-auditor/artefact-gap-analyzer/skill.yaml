name: "artefact-gap-analyzer"
version: "1.0.0"
description: "Compare expected audit evidence artefacts from an audit program JSON against provided files and report gaps with coverage percentage."
author: "IT Audit Team"
license: "MIT"
triggers:
  - keywords: ["artefact gap", "evidence gap", "missing evidence", "audit evidence", "evidence tracker"]
  - patterns: ["missing.*artefact", "gap.*analysis.*evidence", "evidence.*coverage"]
parameters:
  - name: program
    type: string
    required: true
    description: "Path to audit_program.json generated by audit-scope-checklist"
  - name: provided
    type: string
    required: true
    description: "Comma-separated list of file names OR path to a directory of evidence files"
execution:
  runtime: "python"
  command: "python main.py"
  args:
    - "--program"
    - "{{program}}"
    - "--provided"
    - "{{provided}}"
