name: "lead-it-auditor-playbook"
version: "1.0.0"
description: "Step-by-step lead IT auditor methodology covering engagement planning through final reporting and closeout. Reference this playbook at the start of every audit engagement."
author: "IT Audit Team"
license: "MIT"
triggers:
  - keywords: ["audit playbook", "audit methodology", "audit steps", "audit procedure", "how to audit"]
  - patterns: ["lead.*auditor.*playbook", "audit.*step.*by.*step", "audit.*methodology"]
parameters:
  - name: step
    type: string
    required: false
    description: "Step number (1-6) to display, or 'full' for all steps (default: full)"
execution:
  runtime: "python"
  command: "python main.py"
  args:
    - "--step"
    - "{{step}}"
