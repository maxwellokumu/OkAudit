name: "incident-timeline-builder"
version: "1.0.0"
description: "Build a chronological incident timeline from JSON-lines or CSV logs, grouped by hour with flagged IOC events highlighted. Supports actor filtering and JSON output."
author: "IT Audit Team"
license: "MIT"
triggers:
  - keywords: ["incident timeline", "incident investigation", "log timeline", "event reconstruction"]
  - patterns: ["build.*timeline", "incident.*chronolog", "reconstruct.*event"]
parameters:
  - name: logs
    type: string
    required: true
    description: "Path to JSON-lines or CSV log file"
  - name: start
    type: string
    required: false
    description: "Include events from this ISO timestamp"
  - name: end
    type: string
    required: false
    description: "Include events until this ISO timestamp"
  - name: actor
    type: string
    required: false
    description: "Filter events by this user or source IP"
  - name: output
    type: string
    required: false
    description: "Output format: markdown (default) or json"
execution:
  runtime: "python"
  command: "python main.py"
  args: ["--logs", "{{logs}}"]
