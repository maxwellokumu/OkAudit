name: "log-monitoring-playbook"
version: "1.0.0"
description: "Step-by-step logging and monitoring audit methodology: log inventory, baseline, anomaly detection, incident investigation, and reporting."
author: "IT Audit Team"
license: "MIT"
triggers:
  - keywords: ["logging playbook", "monitoring audit", "log review methodology"]
parameters:
  - name: step
    type: string
    required: false
    description: "Step number (1-5) or 'full'"
execution:
  runtime: "python"
  command: "python main.py"
  args: ["--step", "{{step}}"]
