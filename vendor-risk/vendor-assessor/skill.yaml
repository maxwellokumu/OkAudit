name: "vendor-assessor"
version: "1.0.0"
description: "Score vendor security posture using a 25-question assessment across Data Security, Business Continuity, Compliance, Access Control, and Incident Response."
author: "IT Audit Team"
license: "MIT"
triggers:
  - keywords: ["vendor assessment", "vendor risk", "third party risk", "vendor score", "supplier assessment"]
  - patterns: ["assess.*vendor", "vendor.*risk.*score", "third.*party.*assess"]
parameters:
  - name: answers
    type: string
    required: true
    description: "Path to JSON answers file {Q001: yes/no/partial/na}"
  - name: weights
    type: string
    required: false
    description: "Path to JSON category weights file"
  - name: output
    type: string
    required: false
    description: "Output format: markdown (default) or json"
execution:
  runtime: "python"
  command: "python main.py"
  args: ["--answers", "{{answers}}"]
